name: Build Single Version

on:
  workflow_call:
    inputs:
      software:
        required: true
        type: string
      version:
        required: true
        type: string
      runners:
        required: true
        type: string
        description: "JSON array of {platform, runner} entries"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.runners) }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install autoconf automake libtool pkg-config 2>/dev/null || true

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          # Git Bash provides curl, unzip, tar. Nothing extra needed for repackage.
          echo "Windows runner — using Git Bash built-ins"

      - name: Build
        run: |
          chmod +x scripts/build-${{ inputs.software }}.sh
          ./scripts/build-${{ inputs.software }}.sh "${{ inputs.version }}" "${{ matrix.platform }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.software }}-${{ matrix.platform }}-${{ inputs.version }}
          path: output/
          retention-days: 1

  push:
    needs: build
    runs-on: ubuntu-latest
    # Only release if ALL matrix builds succeeded. We don't want to publish
    # a partial release (e.g. linux-amd64 only) if one platform fails.
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        id: download
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.software }}-*-${{ inputs.version }}
          path: /tmp/artifacts
        continue-on-error: true

      - name: Debug artifacts
        if: steps.download.outcome == 'success'
        run: |
          echo "=== Downloaded artifacts ==="
          find /tmp/artifacts -type f | head -50
          echo ""
          echo "=== Directory structure ==="
          ls -laR /tmp/artifacts/ || echo "No artifacts directory"

      - name: Upload to GitHub Release
        if: steps.download.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          SOFTWARE="${{ inputs.software }}"
          VERSION="${{ inputs.version }}"
          TAG="${SOFTWARE}-${VERSION}"
          STAGE=/tmp/release-stage
          mkdir -p "$STAGE"

          # Pack each platform's output into <platform>.tar.gz
          # (deterministic flags for reproducibility, -9 for max compression)
          ANY_PACKED=false
          for artifact_dir in /tmp/artifacts/*/; do
            [ -d "$artifact_dir" ] || continue
            DIRNAME=$(basename "$artifact_dir")
            PLATFORM=$(echo "$DIRNAME" | sed "s/^${SOFTWARE}-//;s/-${VERSION}$//")
            TARBALL="${STAGE}/${PLATFORM}.tar.gz"

            tar -czf "$TARBALL" \
                --owner=0 --group=0 --numeric-owner \
                -C "$artifact_dir" .

            SIZE=$(du -h "$TARBALL" | cut -f1)
            COUNT=$(tar -tzf "$TARBALL" | wc -l | tr -d ' ')
            echo "✓ ${PLATFORM}.tar.gz — ${SIZE}, ${COUNT} files"
            ANY_PACKED=true
          done

          if [ "$ANY_PACKED" != true ]; then
            echo "⚠ No artifacts packed — nothing to release"
            exit 0
          fi

          # Create the release if missing, else reuse it. Upload tarballs as assets;
          # --clobber replaces any existing asset with the same name (enables re-runs).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --title "${SOFTWARE} ${VERSION}" \
              --notes "Prebuilt ${SOFTWARE} ${VERSION} binaries." \
              --latest=false
          else
            echo "Release $TAG exists — updating assets..."
          fi

          # Retry upload: GitHub's release API is eventually-consistent,
          # so a freshly-created release may 404 on upload for a few seconds.
          for attempt in 1 2 3 4 5; do
            if gh release upload "$TAG" "$STAGE"/*.tar.gz --clobber; then
              break
            fi
            if [ "$attempt" = 5 ]; then
              echo "✗ Upload failed after $attempt attempts"
              exit 1
            fi
            echo "Upload attempt $attempt failed — retrying in 3s..."
            sleep 3
          done
          echo "✅ Uploaded assets to release $TAG"
          gh release view "$TAG" --json assets \
            --jq '.assets[] | "  \(.name) — \(.size) bytes"'
