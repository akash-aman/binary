name: Build Single Version

on:
    workflow_call:
        inputs:
            software:
                required: true
                type: string
            version:
                required: true
                type: string

permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: linux-amd64
                      runner: ubuntu-latest
                    - platform: darwin-arm64
                      runner: macos-14
                    - platform: windows-amd64
                      runner: windows-latest
        runs-on: ${{ matrix.runner }}
        continue-on-error: ${{ matrix.platform == 'windows-amd64' }}
        steps:
            - uses: actions/checkout@v4

            - name: Install dependencies (Linux)
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y build-essential autoconf automake libtool pkg-config

            - name: Install dependencies (macOS)
              if: runner.os == 'macOS'
              run: |
                  brew install autoconf automake libtool pkg-config 2>/dev/null || true

            - name: Setup MSYS2 (Windows)
              if: runner.os == 'Windows'
              uses: msys2/setup-msys2@v2
              with:
                  msystem: MINGW64
                  update: true
                  install: >-
                      mingw-w64-x86_64-gcc
                      mingw-w64-x86_64-make
                      make
                      pkg-config
                      autoconf
                      automake
                      libtool

            - name: Build (Linux/macOS)
              if: runner.os != 'Windows'
              run: |
                  chmod +x scripts/build-${{ inputs.software }}.sh
                  ./scripts/build-${{ inputs.software }}.sh "${{ inputs.version }}" "${{ matrix.platform }}"

            - name: Build (Windows)
              if: runner.os == 'Windows'
              shell: msys2 {0}
              run: |
                  ./scripts/build-${{ inputs.software }}.sh "${{ inputs.version }}" "${{ matrix.platform }}"

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ inputs.software }}-${{ matrix.platform }}-${{ inputs.version }}
                  path: output/
                  retention-days: 1

    push:
        needs: build
        runs-on: ubuntu-latest
        if: always() && !cancelled()
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Download artifacts
              id: download
              uses: actions/download-artifact@v4
              with:
                  pattern: ${{ inputs.software }}-*-${{ inputs.version }}
                  path: /tmp/artifacts
              continue-on-error: true

            - name: Debug artifacts
              if: steps.download.outcome == 'success'
              run: |
                  echo "=== Downloaded artifacts ==="
                  find /tmp/artifacts -type f | head -50
                  echo ""
                  echo "=== Directory structure ==="
                  ls -laR /tmp/artifacts/ || echo "No artifacts directory"

            - name: Push to binary branch
              if: steps.download.outcome == 'success'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Switch to binary branch (create orphan if it doesn't exist)
                  if git ls-remote --heads origin binary | grep -q binary; then
                    git fetch origin binary
                    git checkout binary
                  else
                    git checkout --orphan binary
                    git rm -rf --ignore-unmatch . 2>/dev/null || true
                    git clean -fd 2>/dev/null || true
                  fi

                  SOFTWARE="${{ inputs.software }}"
                  VERSION="${{ inputs.version }}"
                  CHANGED=false

                  for artifact_dir in /tmp/artifacts/*/; do
                    [ -d "$artifact_dir" ] || continue
                    DIRNAME=$(basename "$artifact_dir")
                    # Artifact name format: software-platform-version
                    PLATFORM=$(echo "$DIRNAME" | sed "s/^${SOFTWARE}-//;s/-${VERSION}$//")

                    DEST="${SOFTWARE}/${PLATFORM}/${VERSION}"
                    mkdir -p "$DEST"
                    cp -r "${artifact_dir}"* "$DEST/"
                    CHANGED=true
                    echo "✓ ${DEST}/"
                    ls -lh "$DEST/"
                  done

                  if [ "$CHANGED" = true ]; then
                    git add .
                    if git diff --cached --quiet; then
                      echo "No changes to commit (binaries identical)"
                    else
                      git commit -m "Add ${SOFTWARE} ${VERSION} binaries"
                      git push origin binary
                      echo "✅ Pushed ${SOFTWARE} ${VERSION} to binary branch"
                    fi
                  else
                    echo "⚠ No artifacts found — nothing to push"
                  fi
