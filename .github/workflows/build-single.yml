name: Build Single Version

on:
  workflow_call:
    inputs:
      software:
        required: true
        type: string
      version:
        required: true
        type: string
      runners:
        required: true
        type: string
        description: "JSON array of {platform, runner} entries"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.runners) }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install autoconf automake libtool pkg-config 2>/dev/null || true

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          # Git Bash provides curl, unzip, tar. Nothing extra needed for repackage.
          echo "Windows runner — using Git Bash built-ins"

      - name: Build
        run: |
          chmod +x scripts/build-${{ inputs.software }}.sh
          ./scripts/build-${{ inputs.software }}.sh "${{ inputs.version }}" "${{ matrix.platform }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.software }}-${{ matrix.platform }}-${{ inputs.version }}
          path: output/
          retention-days: 1

  push:
    needs: build
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        id: download
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ inputs.software }}-*-${{ inputs.version }}
          path: /tmp/artifacts
        continue-on-error: true

      - name: Debug artifacts
        if: steps.download.outcome == 'success'
        run: |
          echo "=== Downloaded artifacts ==="
          find /tmp/artifacts -type f | head -50
          echo ""
          echo "=== Directory structure ==="
          ls -laR /tmp/artifacts/ || echo "No artifacts directory"

      - name: Push to binary branch
        if: steps.download.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to binary branch (create orphan if it doesn't exist)
          if git ls-remote --heads origin binary | grep -q binary; then
            git fetch origin binary
            git checkout binary
          else
            git checkout --orphan binary
            git rm -rf --ignore-unmatch . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
          fi

          SOFTWARE="${{ inputs.software }}"
          VERSION="${{ inputs.version }}"
          CHANGED=false

          for artifact_dir in /tmp/artifacts/*/; do
            [ -d "$artifact_dir" ] || continue
            DIRNAME=$(basename "$artifact_dir")
            # Artifact name format: software-platform-version
            PLATFORM=$(echo "$DIRNAME" | sed "s/^${SOFTWARE}-//;s/-${VERSION}$//")

            DEST_DIR="${SOFTWARE}/${PLATFORM}"
            TARBALL="${DEST_DIR}/${VERSION}.tar.gz"
            mkdir -p "$DEST_DIR"

            # Pack the whole artifact payload into a single tarball so we store
            # one file per (software, platform, version) instead of thousands.
            # gzip -9 for max compression; deterministic flags for reproducibility.
            tar -czf "$TARBALL" \
                --owner=0 --group=0 --numeric-owner \
                -C "$artifact_dir" .

            SIZE=$(du -h "$TARBALL" | cut -f1)
            COUNT=$(tar -tzf "$TARBALL" | wc -l | tr -d ' ')
            echo "✓ ${TARBALL} — ${SIZE}, ${COUNT} files"
            CHANGED=true
          done

          if [ "$CHANGED" = true ]; then
            git add .
            if git diff --cached --quiet; then
              echo "No changes to commit (tarballs identical)"
            else
              git commit -m "Add ${SOFTWARE} ${VERSION} binaries"
              git push origin binary
              echo "✅ Pushed ${SOFTWARE} ${VERSION} to binary branch"
            fi
          else
            echo "⚠ No artifacts found — nothing to push"
          fi
